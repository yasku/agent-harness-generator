# Codex skill: GCP Secret Manager integration for publish-time tokens.
#
# Wraps the `harness secrets` subcommand. Three modes:
#   check          validate the full GCP setup (gcloud, project, secret,
#                  WIF pool)
#   fetch          fetch a secret value to stdout (pipe into env)
#   validate-token fetch NPM_TOKEN and run `npm whoami` — no publish

[skill]
name = "harness-secrets"
version = "0.1.0"
description = "GCP Secret Manager integration: validate setup, fetch values, or confirm an NPM_TOKEN is non-revoked via `npm whoami`. Used for publish-time token rotation without long-lived keys in CI."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-harness-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "agent-harness-generator"
tool = "harness_secrets"

[command]
name = "harness-secrets"
synopsis = "GCP Secret Manager helpers — check / fetch / validate-token"

[[args]]
name = "mode"
prompt = "Which secrets sub-action?"
default = "check"
choices = ["check", "fetch", "validate-token"]

[[args]]
name = "secret"
prompt = "Secret name (default NPM_TOKEN)"
default = "NPM_TOKEN"

[[args]]
name = "project"
prompt = "GCP project override (blank to use active gcloud project)"
default = ""

[[args]]
name = "version"
prompt = "Secret version (only for fetch)"
default = "latest"

[catalog]
tags = ["gcp", "secrets", "secret-manager", "workload-identity-federation", "publish", "ci"]
