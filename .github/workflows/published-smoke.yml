# iter 125 — Published-npm smoke test.
#
# The CI guard the user explicitly asked for: "make sure no regressions
# and final published npx work correctly."
#
# Runs `npx metaharness@latest` end-to-end against the LIVE npm registry —
# not the local checkout. Catches the failure mode where main is green +
# all local tests pass, but the published tarball has a broken bin / a
# missing dist file / an unreachable workspace dep / a stale dependency.
# That mode is exactly what bit us in iter 124 (metaharness@0.1.0 shipped
# with the OLD `openharness` bin name).
#
# Triggers:
#   - on every push to main (so a regression that lands on main is caught
#     within minutes, not within a release cycle)
#   - workflow_dispatch (manual sanity check before a public announce)
#   - daily cron (so a transient registry / dependency break is surfaced
#     even when nothing was pushed)
#
# Job verdict:
#   - PASS — `npx metaharness@latest --help` exits 0 AND scaffolds a
#     minimal harness AND `harness doctor` on the scaffold returns 0.
#   - FAIL — any of the above. Job goes red; the README badge flips.

name: published-smoke

on:
  push:
    branches: [main]
    # No path filter — any push to main should run this. Catching the
    # publish-broken case is the entire point.
  workflow_dispatch:
  schedule:
    # Daily at 14:00 UTC (~10:00 ET). Catches registry-side breakage
    # (npm CDN, transient outages, a dep that got pulled).
    - cron: '0 14 * * *'

permissions:
  contents: read

concurrency:
  group: published-smoke
  cancel-in-progress: false

jobs:
  smoke-published-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['20', '22']
    steps:
      - name: Checkout (only for the README diff — never run the local code)
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print Node + npm versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Resolve latest metaharness version from registry
        id: resolve
        shell: bash
        run: |
          VERSION=$(npm view metaharness@latest version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "metaharness@latest resolves to $VERSION"
          if [[ -z "$VERSION" ]]; then
            echo "FAIL: npm view returned empty version" >&2
            exit 1
          fi

      - name: '`npx metaharness --help` exits 0 (verifies bin entry + dist intact)'
        shell: bash
        run: |
          # Use `npx --yes` to skip the install-confirm prompt that CI hangs on.
          # --help is the cheapest smoke; just verifies bin + dist resolved.
          # If this is non-zero, the published tarball is broken (bin path,
          # missing dist, etc.) — exactly what iter 124's 0.1.0 hit.
          npx --yes metaharness@latest --help

      - name: '`npx metaharness --version` reports the resolved version'
        shell: bash
        run: |
          OUT=$(npx --yes metaharness@latest --version 2>&1)
          echo "stdout: $OUT"
          # Just verify the command ran; the version-string format is
          # owned by the CLI, not by this guard.

      - name: Scaffold a minimal harness via `npx metaharness`
        shell: bash
        run: |
          mkdir -p /tmp/smoke-harness
          cd /tmp/smoke-harness
          npx --yes metaharness@latest my-bot \
            --template minimal \
            --host claude-code \
            --force
          # Confirm the harness directory + .harness/manifest.json landed.
          test -d my-bot
          test -f my-bot/.harness/manifest.json
          test -f my-bot/package.json
          echo "Scaffolded my-bot/ with $(ls my-bot/ | wc -l) entries"

      - name: '`metaharness score <repo>` produces the ADR-041 scorecard'
        shell: bash
        run: |
          # Build a tiny fixture repo and verify the published score command works:
          # the 6-line card, the --top candidate list, and the --constraints gate.
          mkdir -p /tmp/smoke-score
          cd /tmp/smoke-score
          printf '{"name":"smoke-sdk","scripts":{"build":"tsc","test":"vitest"},"devDependencies":{"typescript":"^5"}}' > package.json
          printf '# smoke-sdk\nA TypeScript SDK / npm client library.\n' > README.md
          OUT=$(npx --yes metaharness@latest score . 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "Harness fit:"
          echo "$OUT" | grep -q "Recommended mode:"
          npx --yes metaharness@latest score . --top 2 | grep -q "harness designs"
          # --constraints exits 0 for a healthy repo (hard gate satisfied)
          npx --yes metaharness@latest score . --constraints | grep -q "scaffold-ready"
          echo "score command smoke OK"

      - name: '`harness doctor` on the scaffolded harness exits 0'
        shell: bash
        run: |
          cd /tmp/smoke-harness/my-bot
          npx --yes --package=metaharness@latest -- harness doctor .
          # If doctor exits non-zero here, the published tarball generates
          # a non-healthy scaffold — a pre-release regression we want to
          # catch BEFORE users complain.

  smoke-published-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install @ruvnet/agent-harness-generator from registry
        shell: bash
        run: |
          mkdir -p /tmp/smoke-lib
          cd /tmp/smoke-lib
          npm init -y > /dev/null
          npm install @ruvnet/agent-harness-generator@latest

      - name: Smoke-import the library
        shell: bash
        run: |
          cd /tmp/smoke-lib
          cat > smoke.mjs <<'EOF'
          import {
            HOSTS,
            TEMPLATES,
            validateHarnessName,
            scaffold,
          } from '@ruvnet/agent-harness-generator';

          if (!Array.isArray(HOSTS) || !HOSTS.includes('claude-code')) {
            console.error('FAIL: HOSTS missing claude-code'); process.exit(1);
          }
          if (!Array.isArray(TEMPLATES) || TEMPLATES.length < 18) {
            console.error('FAIL: TEMPLATES too small:', TEMPLATES?.length); process.exit(1);
          }
          if (typeof validateHarnessName !== 'function') {
            console.error('FAIL: validateHarnessName not a function'); process.exit(1);
          }
          if (typeof scaffold !== 'function') {
            console.error('FAIL: scaffold not a function'); process.exit(1);
          }
          console.log('PASS: library imports + surface area intact');
          console.log('  HOSTS:', HOSTS.length, 'TEMPLATES:', TEMPLATES.length);
          EOF
          node smoke.mjs

  smoke-all-hosts:
    # iter 131 — wire scripts/verify-all-hosts.mjs into the CI guard.
    # Scaffolds for every host from the LIVE npm registry and verifies
    # each harness loads in its target runtime (where installable) or
    # satisfies the documented schema (where not). The claude-code job
    # uses the Anthropic claude CLI under `claude -p` AND
    # `claude -p --plugin-dir <harness>` once iter-131 lands the
    # .claude-plugin/plugin.json template entry.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Scaffold a harness for every host from `npx metaharness@latest`
        shell: bash
        run: |
          mkdir -p /tmp/all-hosts && cd /tmp/all-hosts
          for host in claude-code codex pi-dev hermes openclaw rvm copilot opencode github-actions; do
            echo ""
            echo "=== HOST: $host ==="
            rm -rf "bot-$host"
            npx --yes metaharness@latest "bot-$host" \
              --template minimal --host "$host" --force
          done

      - name: Run verify-all-hosts.mjs (schema + dep check; runtime where available)
        shell: bash
        working-directory: /tmp/all-hosts
        run: |
          cp ${{ github.workspace }}/scripts/verify-all-hosts.mjs .
          node verify-all-hosts.mjs

  smoke-example-packages:
    # iter 142 — the 18 @metaharness/* one-command wrappers are live on
    # npm (iter 140). Each wraps `npx metaharness@latest <name> --template
    # <X> --host <Y>`. This guard npx-invokes a representative subset from
    # the LIVE registry on the daily cron + every push, catching the case
    # where a wrapper's bin breaks OR metaharness changes a flag the
    # wrapper still passes. A scoped sample (not all 18) keeps CI fast
    # while covering one host wrapper + one vertical wrapper + the
    # claude-code wrapper (the most-used path).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Scaffold from a sample of published @metaharness/* wrappers
        shell: bash
        run: |
          mkdir -p /tmp/ex && cd /tmp/ex
          fail=0
          # host wrapper (hermes), vertical wrapper (devops), claude-code wrapper.
          # `.claude-plugin/plugin.json` is a Claude-Code artifact: only claude-code-
          # host scaffolds emit it (GH #11 dropped it for non-claude hosts like
          # hermes/rvm). So only assert plugin.json for the claude-code-host wrappers.
          for pkg in hermes devops claude-code; do
            echo ""
            echo "=== @metaharness/$pkg ==="
            rm -rf "$pkg-bot"
            if npx --yes "@metaharness/$pkg@latest" "$pkg-bot"; then
              test -f "$pkg-bot/.harness/manifest.json" \
                && echo "PASS @metaharness/$pkg — manifest present" \
                || { echo "FAIL @metaharness/$pkg — no manifest"; fail=1; }
              # plugin.json only for claude-code-host wrappers (devops + claude-code)
              case "$pkg" in
                hermes)
                  test ! -f "$pkg-bot/.claude-plugin/plugin.json" \
                    && echo "PASS @metaharness/$pkg — correctly no plugin.json (non-claude host, GH #11)" \
                    || { echo "FAIL @metaharness/$pkg — unexpected plugin.json on non-claude host"; fail=1; } ;;
                *)
                  test -f "$pkg-bot/.claude-plugin/plugin.json" \
                    && echo "PASS @metaharness/$pkg — .claude-plugin/plugin.json present" \
                    || { echo "FAIL @metaharness/$pkg — no plugin.json"; fail=1; } ;;
              esac
            else
              echo "FAIL @metaharness/$pkg — npx invocation errored"; fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: all sampled wrappers scaffold" || { echo "FAIL"; exit 1; }

  notify-on-fail:
    runs-on: ubuntu-latest
    needs: [smoke-published-cli, smoke-published-lib, smoke-all-hosts, smoke-example-packages]
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Open issue on scheduled-cron failure
        uses: actions/github-script@v7
        with:
          script: |
            // Only fires on the daily cron path — push-failures already
            // surface in the commit-status check. Cron failures are
            // silent otherwise; this turns them into an issue.
            const title = `[published-smoke] ${new Date().toISOString().slice(0, 10)} — npx metaharness failed`;
            const body = [
              `The daily \`published-smoke\` workflow failed.`,
              ``,
              `Most likely causes:`,
              `- The latest \`metaharness\` on npm has a broken bin or missing dist file`,
              `- A transitive dependency was pulled / yanked from the registry`,
              `- npm registry CDN transient outage (re-run to confirm)`,
              ``,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'published-smoke'],
            });
