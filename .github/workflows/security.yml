name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit --deny warnings

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          arguments: --workspace check

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit
        run: |
          npm install --package-lock-only
          npm audit --omit=dev --audit-level=high

  audit-deps-aggregate:
    # iter 38: aggregate audit-deps.mjs runs npm + cargo audit through the
    # same JSON parser and emits structured PASS/WARN/FAIL. Acts as a
    # single source-of-truth for "is this branch shippable from a deps
    # safety perspective" — duplicates the per-tool jobs above but with
    # one exit code, easy for branch-protection to gate on.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: npm install --package-lock-only
        run: npm install --package-lock-only
      - name: audit-deps aggregate (fail on high+ advisories)
        run: node scripts/audit-deps.mjs --level=high

  sbom:
    # iter 50: generate an SPDX-2.3 SBOM (npm + cargo) and upload as a
    # CI artifact for downstream auditors / regulated-industry users.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install --package-lock-only
        run: npm install --package-lock-only
      - name: Generate SPDX SBOM
        run: node scripts/sbom.mjs --out=dist/sbom.json
      - name: Validate SBOM shape
        run: node scripts/sbom.mjs --validate-only
      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: dist/sbom.json
          if-no-files-found: error

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
