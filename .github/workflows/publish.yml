name: Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (semver)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

jobs:
  build-native:
    name: native ${{ matrix.target }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kernel-linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kernel-linux-arm64-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kernel-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kernel-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: kernel-win32-x64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: Swatinem/rust-cache@v2
      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@^3
      - name: Cross-compile setup (aarch64 linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: napi build
        working-directory: crates/kernel-napi
        run: napi build --platform --release --target ${{ matrix.target }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: crates/kernel-napi/*.node

  build-wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm
        run: wasm-pack build crates/kernel-wasm --target bundler --release --out-dir ../../packages/kernel-js/pkg
      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-wasm
          path: packages/kernel-js/pkg/

  gcp-auth-and-publish:
    name: Publish to npm (gated on GCP secret fetch)
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-native
      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-wasm
          path: packages/kernel-js/pkg
      - name: GCP Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Install gcloud SDK
        # Required by scripts/validate-gcp-secrets.mjs (Gate 1 below).
        # The auth action sets ADC but doesn't install the CLI itself.
        uses: google-github-actions/setup-gcloud@v2
      - name: Fetch NPM_TOKEN from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            npm_token:${{ env.GCP_PROJECT_ID }}/NPM_TOKEN
      - name: Smoke test before publish
        run: |
          npm ci || npm install
          npm run build
          npm run test
          node scripts/smoke.mjs

      # ─────────────────────────────────────────────────────────────────
      # PRE-PUBLISH GATES (iter 18 + 20)
      # ─────────────────────────────────────────────────────────────────
      - name: Gate 1 — GCP Secret Manager validation
        env:
          GCP_PROJECT: ${{ env.GCP_PROJECT_ID }}
          NPM_SECRET_NAME: NPM_TOKEN
          # iter 145: validate-gcp-secrets.mjs validates the npm token AND
          # any extra REQUIRED_SECRETS (comma-separated). The Pinata pin
          # below is OPTIONAL by design, so PINATA_JWT is NOT required here
          # by default. To make the IPFS marketplace pin a hard publish
          # prerequisite, set: REQUIRED_SECRETS: PINATA_JWT
          # REQUIRED_SECRETS: PINATA_JWT
        run: node scripts/validate-gcp-secrets.mjs

      - name: Gate 2 — npm publish dry-run on every package
        run: node scripts/publish-dryrun.mjs

      # ─────────────────────────────────────────────────────────────────
      # ACTUAL PUBLISH — every non-private workspace package
      # ─────────────────────────────────────────────────────────────────
      - name: Publish @ruflo/kernel-* native packages
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        run: |
          echo "TODO: publish per-platform native packages from dist-native/ (lands in a follow-up iteration)"

      - name: Publish @ruflo/kernel (umbrella)
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        working-directory: packages/kernel-js
        run: npm publish --provenance --access public

      - name: Publish @ruflo/sdk
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        working-directory: packages/sdk
        run: npm publish --provenance --access public

      - name: Publish host adapters (6 packages)
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        run: |
          set -euo pipefail
          for host in host-claude-code host-codex host-pi-dev host-hermes host-openclaw host-rvm; do
            echo "::group::publish @ruflo/$host"
            (cd packages/$host && npm publish --provenance --access public)
            echo "::endgroup::"
          done

      - name: Publish vertical packs (2 packages)
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        run: |
          set -euo pipefail
          for v in vertical-base vertical-trading; do
            echo "::group::publish @ruflo/$v"
            (cd packages/$v && npm publish --provenance --access public)
            echo "::endgroup::"
          done

      - name: Publish create-agent-harness
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
        working-directory: packages/create-agent-harness
        run: npm publish --provenance --access public

      # ─────────────────────────────────────────────────────────────────
      # MARKETPLACE: pin the claude-marketplace registry entry to IPFS
      # ─────────────────────────────────────────────────────────────────
      - name: Generate marketplace registry entry
        # Reads .claude-plugin/plugin.json + root package.json + writes
        # dist/marketplace-entry.json. Idempotent; the file is what gets
        # pinned to IPFS so other agents discover this plugin.
        run: node scripts/marketplace-entry.mjs

      - name: Fetch Pinata JWT from GCP Secret Manager
        id: pinata
        # Optional — only runs when PINATA_JWT exists in Secret Manager.
        # First-time releases or org-locked orgs skip this gracefully.
        continue-on-error: true
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            pinata_jwt:${{ env.GCP_PROJECT_ID }}/PINATA_JWT

      - name: Pin marketplace entry to IPFS via Pinata
        if: steps.pinata.outcome == 'success'
        env:
          PINATA_JWT: ${{ steps.pinata.outputs.pinata_jwt }}
        # Single-file pin. The returned IpfsHash is the CID we'd reference
        # in the discovery registry update step (which lives outside this
        # repo). Failure here is non-fatal: the publish has already
        # succeeded, the marketplace listing is a downstream concern.
        continue-on-error: true
        run: |
          set -euo pipefail
          cid=$(curl -sf -X POST \
            -H "Authorization: Bearer $PINATA_JWT" \
            -F "file=@dist/marketplace-entry.json" \
            "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            | sed -n 's/.*"IpfsHash":"\([^"]*\)".*/\1/p')
          if [ -n "$cid" ]; then
            echo "::notice title=Marketplace pinned::CID=$cid"
            echo "marketplace_cid=$cid" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Pinata pin returned no CID; check logs"
          fi
